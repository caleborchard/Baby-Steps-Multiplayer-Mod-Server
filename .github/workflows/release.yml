name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag for the release (e.g. v1.2.0)'
        required: true
      release_name:
        description: 'Release name'
        required: false
        default: ''
      body:
        description: 'Release body'
        required: false
        default: ''
      prerelease:
        description: 'Prerelease? (true/false)'
        required: false
        default: 'false'
      target_commitish:
        description: 'Commitish value that determines where the Git tag is created from. Can be any branch or commit SHA. Defaults to repository default branch.'
        required: false
        default: ''
      generate_release_notes:
        description: 'Whether to automatically generate the name and body for this release. If name is specified, the specified name will be used; otherwise, a name will be automatically generated. If body is specified, the body will be pre-pended to the automatically generated notes.'
        required: false
        default: 'false'

permissions:
  contents: write   # needed to create a release & upload release assets
  packages: write   # needed to push to GHCR

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BabyStepsMultiplayerServer-linux
        path: BabyStepsMultiplayerServer/bin/Debug/net8.0/

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BabyStepsMultiplayerServer-windows
        path: BabyStepsMultiplayerServer/bin/Debug/net8.0/

  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: BabyStepsMultiplayerServer-linux
        path: ./artifacts/linux
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: BabyStepsMultiplayerServer-windows
        path: ./artifacts/windows
    - name: Package artifacts
      run: |
        mkdir -p release_assets
        cd artifacts/linux
        zip -r ../../release_assets/BabyStepsMultiplayerServer-linux.zip .
        cd ../windows
        zip -r ../../release_assets/BabyStepsMultiplayerServer-windows.zip .
        cd ../..
        ls -la release_assets
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.release_tag }}
        name: ${{ github.event.inputs.release_name }}
        body: ${{ github.event.inputs.body }}
        prerelease: ${{ github.event.inputs.prerelease }}
        target_commitish: ${{ github.event.inputs.target_commitish }}
        draft: false
        files: |
          release_assets/BabyStepsMultiplayerServer-linux.zip
          release_assets/BabyStepsMultiplayerServer-windows.zip
    - uses: actions/checkout@v4
    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push image to GHCR
      uses: docker/build-push-action@v4
      with:
        context: .
        file: docker/Dockerfile
        push: true
        #FIXME: change username to caleb 
        tags: |
          ghcr.io/azim/baby-steps-server:${{ github.event.inputs.release_tag }}
          ghcr.io/azim/baby-steps-server:latest